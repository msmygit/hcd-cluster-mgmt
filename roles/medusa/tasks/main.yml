---
# Main tasks for Cassandra Medusa installation

- name: Include OS-specific tasks
  include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"

- name: Create Medusa venv parent directory
  file:
    path: "{{ medusa_venv | dirname }}"
    state: directory
    mode: '0755'

- name: Create dedicated Python 3.11 venv for Medusa
  shell: "python3.11 -m venv {{ medusa_venv }}"
  args:
    creates: "{{ medusa_venv }}/bin/activate"

- name: Install Medusa {{ medusa_version }} into dedicated venv
  pip:
    name: "cassandra-medusa=={{ medusa_version }}"
    state: present
    virtualenv: "{{ medusa_venv }}"
    virtualenv_python: python3.11

- name: Symlink medusa binary to /usr/local/bin for global access
  file:
    src: "{{ medusa_bin }}"
    dest: /usr/local/bin/medusa
    state: link

- name: Create Medusa configuration directory
  file:
    path: "{{ medusa_config_dir }}"
    state: directory
    owner: "{{ medusa_user }}"
    group: "{{ medusa_group }}"
    mode: '0755'

- name: Create local backup directory
  file:
    path: "{{ medusa_local_backup_dir }}"
    state: directory
    owner: "{{ medusa_user }}"
    group: "{{ medusa_group }}"
    mode: '0755'
  when: medusa_storage_provider == 'local'

- name: Configure Medusa medusa.ini
  template:
    src: medusa.ini.j2
    dest: "{{ medusa_config_file }}"
    owner: "{{ medusa_user }}"
    group: "{{ medusa_group }}"
    mode: '0600'

- name: Create S3 credentials file
  template:
    src: s3_credentials.j2
    dest: "{{ medusa_config_dir }}/.s3cfg"
    owner: "{{ medusa_user }}"
    group: "{{ medusa_group }}"
    mode: '0600'
  when:
    - medusa_storage_provider == 's3'
    - medusa_s3_access_key_id != ''
  no_log: true

- name: Create GCS credentials file
  copy:
    src: "{{ medusa_gcs_credentials_file }}"
    dest: "{{ medusa_config_dir }}/gcs_credentials.json"
    owner: "{{ medusa_user }}"
    group: "{{ medusa_group }}"
    mode: '0600'
  when:
    - medusa_storage_provider == 'gcs'
    - medusa_gcs_credentials_file != ''
  no_log: true

- name: Verify Medusa installation
  command: "{{ medusa_bin }} --version"
  register: medusa_version_output
  changed_when: false

- name: Display Medusa version
  debug:
    msg: "Medusa installed: {{ medusa_version_output.stdout }}"
